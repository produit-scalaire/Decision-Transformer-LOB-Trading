# Default Hydra configuration
defaults:
  - _self_

# Pipeline execution toggles
pipeline:
  run_generation: true
  run_training: true
  run_evaluation: true

# Hardware specific settings (Optimized for Ryzen 9 9950X & RTX 5090)
hardware:
  workers: 4
  device: "cuda"
  compile_model: true  # Torch 2.x max-autotune

# Centralized paths
paths:
  train_data: "data/train_trajectories.pt"
  test_data: "data/test_trajectories.pt"
  model_dir: "models"
  plot_dir: "plots"

# Data generation parameters
generator:
  train_episodes: 6000
  test_episodes: 64
  window_size: 100
  episode_length: 2000
  # mid_price: PnL from mid changes only (default for DT / offline data).
  # shaped: same base PnL minus drawdown, rolling return variance, and |position| penalties.
  reward_type: mid_price
  reward_shaping:
    drawdown_coef: 0.02
    variance_coef: 0.5
    time_in_market_coef: 0.0005
    variance_window: 20
  # Return-to-go horizon H: how many future steps to sum for R̂_t = Σ r_{t'} for t' in [t, t+H).
  # null  → sum all rewards to the end of the episode (original DT behaviour).
  # int>0 → sum at most H steps forward; rewards beyond t+H are ignored.
  reward_horizon: null
  # raw: LOB as loaded | log_returns | bps (price channels only; volumes unchanged)
  state_representation: raw
  price_offset: 10.0
  # Elitist train filtering (no policy quotas). Modes: none | top_quantile | positive_only
  quality_filter_mode: top_quantile
  quality_quantile: 0.5
  # Standardize RTG with train-set z-score: (rtg - mu_train) / sigma_train
  standardize_rtg: true
  # Optional explicit path. null -> "<train_data_stem>_rtg_scaler.pt" next to train_data
  rtg_scaler_out: null

# Decision Transformer architecture
# Set architecture: "transformer" to use the original DT (default).
# Set architecture: "cnn" to use the CNN-encoder variant.
model:
  architecture: "transformer"   # "transformer" | "cnn"
  state_dim: 41
  act_dim: 3
  d_model: 128
  n_heads: 4
  n_layers: 3
  max_timestep: 10000
  dropout: 0.1
  # CNN-encoder settings (only used when architecture: "cnn")
  cnn_channels: 64              # number of hidden channels in the CNN encoder
  cnn_kernel_size: 3            # kernel size for both Conv1d layers

# Optimization & Training
training:
  epochs: 5
  batch_size: 2048     # Keep huge for RTX 5090 32GB VRAM
  context_len: 100
  lr: 1e-4
  weight_decay: 1e-4

# Inference & Validation
evaluation:
  # RTG tokens during rollout (causal DT update).
  #   autoregressive — R_{t+1} = R_t − r_t
  rtg_rollout_mode: autoregressive
  # Optional friction term used in evaluation rewards:
  #   r_t = pos_t * ret_t - transaction_cost * |pos_t - pos_{t-1}|
  transaction_cost: 0.0
  # RTG at t=0 must match training scale (sum of episode rewards). Use train_percentiles
  # so targets align with the offline dataset after RTG standardization.
  rtg_source: manual  # manual | train_percentiles
  # Manual fallback: values MUST match the RTG scale from training data.
  # For 2000-step episodes on z-scored FI-2010 LOB, per-episode oracle
  # return is typically ~0.1–0.6; values far above that are out-of-distribution
  # and cause the model to degenerate to holding flat.
  target_rtgs: [0.0, 0.05, 0.1, 0.2, 0.3]  # used when rtg_source: manual
  train_rtg_percentiles: [10, 25, 50, 75, 90]
  context_len: 100
  max_eval_trajectories: 32
  # Advanced-metrics bar chart: drop baselines that crush the y-axis (non-causal etc.).
  # Use [] to show everyone. Default null → code uses Oracle + Mean Reversion.
  advanced_metrics_exclude_agents:
    - Oracle
    - Mean Reversion
  # Single pass over the full FI-2010 test file (Day 10); needs kagglehub dataset cache.
  continuous_day10_plot: true