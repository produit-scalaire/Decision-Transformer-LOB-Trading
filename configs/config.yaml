# Default Hydra configuration
defaults:
  - _self_

# Pipeline execution toggles
pipeline:
  run_generation: true
  run_training: true
  run_evaluation: true

# Hardware specific settings (Optimized for Ryzen 9 9950X & RTX 5090)
hardware:
  workers: 10
  device: "cuda"
  compile_model: true  # Torch 2.x max-autotune

# Centralized paths
paths:
  train_data: "data/train_trajectories.pt"
  test_data: "data/test_trajectories.pt"
  model_dir: "models"
  plot_dir: "plots"

# Data generation parameters
generator:
  train_episodes: 6000
  test_episodes: 1200
  window_size: 100
  episode_length: 2000

# Decision Transformer architecture
model:
  state_dim: 41
  act_dim: 3
  d_model: 128
  n_heads: 4
  n_layers: 3
  max_timestep: 10000
  dropout: 0.1

# Optimization & Training
training:
  epochs: 15
  batch_size: 2048     # Keep huge for RTX 5090 32GB VRAM
  context_len: 100
  lr: 1e-4
  weight_decay: 1e-4

# Inference & Validation
evaluation:
  target_rtgs: [0.0, 0.2 ,0.5, 1.0, 2.0]
  context_len: 100
  max_eval_trajectories: 32